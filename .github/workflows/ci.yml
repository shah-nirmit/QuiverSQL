name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qsql-workspace
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked --workspace
      - name: Bench compile smoke
        run: cargo bench --locked --no-run -p qsql-daemon --bench phase0_benchmarks

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qsql-vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qsql-vscode/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Scanner tests
        run: npm run test:scanner
