[package]
name = "qsql-daemon"
version = "0.1.1-alpha.0"
edition = "2021"

[dependencies]
qsql-core = { path = "../qsql-core" }
qsql-connectors = { path = "../qsql-connectors" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.36", features = ["full"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "phase0_benchmarks"
harness = false
