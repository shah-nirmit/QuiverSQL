# QuiverSQL local connector test databases.
#
# VS Code connection strings:
#   Postgres: postgres://qsql_test:qsql_test@localhost:5432/qsql_test
#   MySQL:    mysql://qsql_test:qsql_test@localhost:3306/qsql_test
#   MariaDB:  mysql://qsql_test:qsql_test@localhost:3306/qsql_test
#
# Live Rust test environment variables:
#   $env:QSQL_POSTGRES_URL="postgres://qsql_test:qsql_test@localhost:5432/qsql_test"
#   $env:QSQL_MYSQL_URL="mysql://qsql_test:qsql_test@localhost:3306/qsql_test"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: qsql_test
      POSTGRES_PASSWORD: qsql_test
      POSTGRES_DB: qsql_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qsql_test -d qsql_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres-init:
    image: postgres:18-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: qsql_test
    command:
      - sh
      - -c
      - |
        psql -h postgres -U qsql_test -d qsql_test <<'SQL'
        CREATE TABLE IF NOT EXISTS customers (
          id INTEGER PRIMARY KEY,
          name TEXT NOT NULL,
          region TEXT NOT NULL,
          active BOOLEAN NOT NULL,
          revenue NUMERIC(12, 2) NOT NULL
        );

        CREATE TABLE IF NOT EXISTS orders (
          id INTEGER PRIMARY KEY,
          customer_id INTEGER NOT NULL REFERENCES customers(id),
          order_total NUMERIC(12, 2) NOT NULL,
          status TEXT NOT NULL,
          created_at TIMESTAMP NOT NULL
        );

        TRUNCATE TABLE orders, customers RESTART IDENTITY;

        INSERT INTO customers (id, name, region, active, revenue) VALUES
          (1, 'Ada Lovelace', 'emea', true, 12500.00),
          (2, 'Grace Hopper', 'na', true, 18750.50),
          (3, 'Katherine Johnson', 'na', false, 9200.25),
          (4, 'Mary Jackson', 'emea', true, 14300.75);

        INSERT INTO orders (id, customer_id, order_total, status, created_at) VALUES
          (101, 1, 250.00, 'paid', '2026-01-05 09:15:00'),
          (102, 1, 125.50, 'pending', '2026-01-09 13:30:00'),
          (103, 2, 980.25, 'paid', '2026-02-10 11:45:00'),
          (104, 3, 450.00, 'refunded', '2026-02-17 16:00:00'),
          (105, 4, 720.10, 'paid', '2026-03-02 08:20:00');
        SQL

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: qsql_test
      MYSQL_USER: qsql_test
      MYSQL_PASSWORD: qsql_test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "qsql_test", "-pqsql_test"]
      interval: 5s
      timeout: 5s
      retries: 30

  mysql-init:
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        until mysql -h mysql -u qsql_test -pqsql_test -e "SELECT 1" > /dev/null 2>&1; do
          echo "Waiting for MySQL to be ready..."
          sleep 2
        done
        mysql -h mysql -u qsql_test -pqsql_test qsql_test <<'SQL'
        CREATE TABLE IF NOT EXISTS customers (
          id INT PRIMARY KEY,
          name VARCHAR(120) NOT NULL,
          region VARCHAR(32) NOT NULL,
          active BOOLEAN NOT NULL,
          revenue DECIMAL(12, 2) NOT NULL
        );

        CREATE TABLE IF NOT EXISTS orders (
          id INT PRIMARY KEY,
          customer_id INT NOT NULL,
          order_total DECIMAL(12, 2) NOT NULL,
          status VARCHAR(32) NOT NULL,
          created_at DATETIME NOT NULL,
          CONSTRAINT fk_orders_customers FOREIGN KEY (customer_id) REFERENCES customers(id)
        );

        DELETE FROM orders;
        DELETE FROM customers;

        INSERT INTO customers (id, name, region, active, revenue) VALUES
          (1, 'Ada Lovelace', 'emea', true, 12500.00),
          (2, 'Grace Hopper', 'na', true, 18750.50),
          (3, 'Katherine Johnson', 'na', false, 9200.25),
          (4, 'Mary Jackson', 'emea', true, 14300.75);

        INSERT INTO orders (id, customer_id, order_total, status, created_at) VALUES
          (101, 1, 250.00, 'paid', '2026-01-05 09:15:00'),
          (102, 1, 125.50, 'pending', '2026-01-09 13:30:00'),
          (103, 2, 980.25, 'paid', '2026-02-10 11:45:00'),
          (104, 3, 450.00, 'refunded', '2026-02-17 16:00:00'),
          (105, 4, 720.10, 'paid', '2026-03-02 08:20:00');
        SQL
